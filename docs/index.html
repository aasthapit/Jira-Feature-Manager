<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira Feature Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Feature Board</h1>
      <div class="meta">
        <form id="add-column-form" class="add-column hidden">
          <input id="add-column-input" type="text" placeholder="New column (label)…" aria-label="New column label" />
          <button type="submit">+ Column</button>
        </form>
        <input id="search" type="search" placeholder="Filter cards…" aria-label="Filter cards" />
        <span id="edit-badge" class="badge hidden" title="Running locally — drag cards to change Jira labels">● Edit mode</span>
        <span id="updated" class="updated"></span>
      </div>
    </header>

    <main id="board" class="board">
      <p class="loading">Loading board…</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
